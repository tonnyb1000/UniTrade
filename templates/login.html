{% extends "base.html" %}
{% block title %}Login – UniTrade{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height:70vh;align-items:center;">
    <div class="col-md-5 col-lg-4 fade-up">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="fas fa-exchange-alt fa-2x mb-2" style="color:var(--c-primary);"></i>
                <h2 style="font-weight:800;letter-spacing:-0.5px;">Welcome back</h2>
                <p style="color:var(--c-muted);font-size:0.875rem;">Sign in to your UniTrade account</p>
            </div>

            <form method="post" action="{{ url_for('login') }}" id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:var(--c-surface2);border-color:var(--c-border);color:var(--c-muted);">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" class="form-control" name="username" id="username"
                               placeholder="your_username" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:var(--c-surface2);border-color:var(--c-border);color:var(--c-muted);">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" class="form-control" name="password" id="password"
                               placeholder="••••••••" required>
                        <button type="button" class="input-group-text" style="background:var(--c-surface2);border-color:var(--c-border);color:var(--c-muted);cursor:pointer;"
                                onclick="togglePwd()"><i class="fas fa-eye" id="eyeIcon"></i></button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>

            <hr>
            <p class="text-center mb-0" style="font-size:0.875rem;color:var(--c-muted);">
                Don't have an account?
                <a href="{{ url_for('register') }}" style="color:var(--c-primary);font-weight:600;">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePwd() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
        pwd.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash');
    } else {
        pwd.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye');
    }
}
</script>
{% endblock %}
